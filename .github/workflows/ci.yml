name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript noEmit)
        run: npm run lint

      - name: Build
        run: npm run build
